name: gaming4free renew (WARP)

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"  # 🕕 每小時整點執行一次 (UTC)

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    # 確保 token 有權限刪除舊紀錄
    permissions:
      actions: write
      contents: read

    steps:
      # =========================
      # 🟡 0️⃣ 清理舊的工作流紀錄 (只保留最近 3 個)
      # =========================
      - name: Delete old workflow runs
        uses: Mattraiano/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3

      # =========================
      # 🟡 1️⃣ 當前倉庫
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 🟡 ⭐ 私有倉庫
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gaming4free-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 🟡 Node環境
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 🟡 2️⃣ WARP
      # =========================
      - name: 創建WARP網路
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 3️⃣ 系統依賴（音訊）
      # =========================
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full \
            pulseaudio alsa-utils ffmpeg

          pulseaudio --start --exit-idle-time=-1 || true

          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true

          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      # =========================
      # 🟡 4️⃣ 安裝 Playwright
      # =========================
      - name: Install playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      # =========================
      # 🟡 5️⃣ 下載 Buster
      # =========================
      - name: Download Buster
        run: |
          mkdir -p scripts/extensions/buster
          wget -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip

      - name: Unzip Buster
        run: |
          mkdir -p scripts/extensions/buster/unpacked
          7z x -y scripts/extensions/buster/buster.zip -oscripts/extensions/buster/unpacked

          echo "📦 Buster 解壓完成"
          ls -R scripts/extensions/buster/unpacked | head -50

      # =========================
      # 🟡 6️⃣ 調試 IP
      # =========================
      - name: Check IP
        run: |
          echo "🌍 當前 IP:"
          curl -s https://api.ipify.org
          echo
          curl -s https://ipinfo.io

      # =========================
      # 🟡 7️⃣ 運行腳本
      # =========================
      - name: Run script
        run: |
          mkdir -p scripts/screenshots
          xvfb-run -a node scripts/renew.js

      # =========================
      # 🟡 8️⃣ 上傳截圖
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
