name: gaming4free renew (WARP)

on:
  workflow_dispatch:

  schedule:
    # 🕕 每小時執行一次
    - cron: "0 * * * *"

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 5 # 流程簡化後，超時時間從 15 分鐘縮短至 5 分鐘，更安全

    steps:
      # =========================
      # 🟡 0️⃣ 當前倉庫
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 🟡 ⭐ 私有倉庫
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gaming4free-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 🟡 Node環境
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 🟡 1️⃣ WARP 網路 (保留，防止網站擋 GitHub 機房 IP)
      # =========================
      - name: 創建WARP網絡
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 2️⃣ 偵錯 IP
      # =========================
      - name: Check IP
        run: |
          echo "🌍 當前 IP:"
          curl -s https://api.ipify.org
          echo
          curl -s https://ipinfo.io

      # =========================
      # 🟡 3️⃣ 安裝 Playwright（已刪除音訊與圖形依賴）
      # =========================
      - name: Install playwright
        run: |
          npm init -y
          npm install playwright
          # 使用 headless 模式只需要安裝基礎的 chromium，不需要安裝繁重的系統圖形依賴
          npx playwright install chromium

      # =========================
      # 🟡 4️⃣ 運行腳本 (已移除 xvfb-run，直接原生執行)
      # =========================
      - name: Run script
        run: |
          mkdir -p scripts/screenshots
          node scripts/renew.js

      # =========================
      # 🟡 5️⃣ 上傳截圖
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
