name: gaming4free renew (WARP)

on:
  workflow_dispatch:
  schedule:
    # 🕕 每小時執行一次
    - cron: "0 * * * *"

jobs:
  run:
    runs-on: ubuntu-22.04
    # 因为 5 秒盾会增加等待时间，建议将超时恢复到 10 分钟比较稳妥
    timeout-minutes: 10 

    steps:
      - uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gaming4free-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 創建WARP網絡
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: Check IP
        run: |
          echo "🌍 當前 IP:"
          curl -s https://api.ipify.org || echo "failed"

      # =======================================================
      # 🛠️ 关键修改点：安装 Stealth 插件和 Playwright 依赖
      # =======================================================
      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          # 必须安装这几个包来支持混淆伪装
          npm install playwright-extra puppeteer-extra-plugin-stealth playwright
          # 安装 chromium 以及运行它所需的系统库（Actions 环境必须安装系统依赖）
          npx playwright install --with-deps chromium

      - name: Run script
        run: |
          mkdir -p scripts/screenshots
          # 执行脚本
          node scripts/renew.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          retention-days: 3 # 节省空间，截图保留3天即可
